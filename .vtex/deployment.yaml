- name: toolbelt
  referenceId: 5YP7PPID
  build:
    provider: dkcicd
    pipelines:
      - name: node-ci-v2
        parameters:
          nodeVersion: "20-bookworm"
          packageManager: yarn
          skipInstall: false
          sonarProjectName: toolbelt
          nodeCommands:
            - ci:prettier-check
            - lint:node
            - ci:test
        when:
          - event: pull_request
            source: branch
          - event: push
            source: branch

      - name: npm-publish-v1
        parameters:
          nodeVersion: "20-bookworm"
          packManager: yarn
          skipInstall: false
          nodeCommands:
            - build
          publishViaGithubWorkflow: true
          workflowFile: publish-npm.yml
          workflowVersion: '{{ ref_name }}'
        when:
          - event: push
            source: tag
        notifications:
          slack:
            channel: cdc-deployments

      - name: techdocs-v1
        parameters:
          entityReference: default/component/toolbelt
          sourceDir: ./
        when:
          - event: push
            source: branch
            regex: main
            path:
              - "docs/**"
              - README.md
              - .vtex/deployment.yaml